spring:
  application:
    name: CarePulse ERP
  profiles:
    active: dev
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:8f0011867c29eeb135d57b28230dc3cd4810ec5a1b37015a864703a450bd87fb}
  expiration: 28800000 # 8 hours
  refresh-expiration: 2592000000 # 30 days

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.web: TRACE