version: '3.8'

services:
  db:
    image: mysql:8
    container_name: carepulse_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carepulse_db
      MYSQL_USER: carepulse_user
      MYSQL_PASSWORD: carepulse_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: ./carepulse-backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: carepulse_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/carepulse_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=carepulse_user
      - SPRING_DATASOURCE_PASSWORD=carepulse_password
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./carepulse-frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: carepulse_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
